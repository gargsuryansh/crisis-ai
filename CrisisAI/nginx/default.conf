# =============================================================================
# CrisisAI — Nginx Reverse Proxy Configuration
# Google Solution Challenge 2026
#
# Routes:
#   /              -> dashboard (React SPA on port 80)
#   /api/          -> backend  (FastAPI on port 8080)
#   /api/v1/ws     -> backend  (WebSocket upgrade)
#
# This file is bind-mounted into the reverse-proxy container.
# =============================================================================

upstream backend {
    server backend:8080;
}

upstream dashboard {
    server dashboard:80;
}

server {
    listen 80;
    server_name _;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 4;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── WebSocket: /api/v1/ws ───────────────────────────────────────────────
    # Must come before the generic /api/ block for specificity
    location /api/v1/ws {
        proxy_pass http://backend/api/v1/ws;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API: /api/ -> backend ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend/api/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running AI inference calls
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # Buffering off for streaming responses (SSE)
        proxy_buffering off;
    }

    # ── Backend health check (exposed for convenience) ──────────────────────
    location = /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
    }

    # ── Dashboard: / -> React SPA ───────────────────────────────────────────
    location / {
        proxy_pass http://dashboard/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets from dashboard
        proxy_cache_valid 200 1h;
    }
}
