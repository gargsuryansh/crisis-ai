# =============================================================================
# CrisisAI — Docker Compose (Local Development Stack)
# Google Solution Challenge 2026
#
# Usage:
#   docker compose up --build        # first run / after code changes
#   docker compose up -d             # detached mode
#   docker compose down -v           # stop and remove volumes
#
# Prerequisites:
#   - Copy .env.example to .env and fill in your API keys
#   - FAISS indexes (*.bin) should be in ./data/embeddings/
# =============================================================================

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crisisai-backend
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - ENVIRONMENT=development
    volumes:
      - ./chroma_db:/app/chroma_db            # ChromaDB persistence
      - ./data:/app/data:ro                   # Protocols + embeddings (read-only)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - crisisai-net

  # ── Dashboard (React via nginx — static build) ────────────────────────────
  # Requires: dashboard/ to have a valid package.json + Vite config.
  # Build: `cd dashboard && npm install && npm run build` first,
  #        OR use dashboard/Dockerfile which handles the full build.
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: crisisai-dashboard
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crisisai-net

  # ── Reverse Proxy (nginx) ─────────────────────────────────────────────────
  # Routes:
  #   /          -> dashboard
  #   /api/      -> backend
  #   /api/v1/ws -> backend (WebSocket upgrade)
  reverse-proxy:
    image: nginx:1.25-alpine
    container_name: crisisai-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - dashboard
    restart: unless-stopped
    networks:
      - crisisai-net

networks:
  crisisai-net:
    driver: bridge
